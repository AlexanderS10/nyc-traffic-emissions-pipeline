services:
  # --- 1. THE INGESTION LAYER (MESSAGE BROKER) ---
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  # --- 2. THE PROCESSING ENGINE (SPARK 4.0.2) ---
  spark-master:
    image: apache/spark:4.0.2
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
    ports:
      - "8080:8080"
      - "7077:7077"

  spark-worker:
    image: apache/spark:4.0.2
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master

  # --- 3. THE STORAGE ARCHITECTURE (S3 DATA LAKE REPLACEMENT) ---
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # --- 4. THE QUERY ENGINE ---
  trino:
    image: trinodb/trino:480
    container_name: trino
    ports:
      - "8081:8080"

  # --- 5. THE SERVING LAYER (DASHBOARD) ---
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - trino
    volumes:
      - grafana_data:/var/lib/grafana

  # --- 6. THE INTERACTIVE DEVELOPMENT ENVIRONMENT ---
  # Built from the local Dockerfile which pins pyspark==4.0.2 to match
  # the apache/spark:4.0.2 cluster above. Run `docker compose build` first,
  # or `docker compose up --build` on first launch.
  jupyter:
    build: .                          # uses the Dockerfile in the same folder
    container_name: jupyter-pyspark
    ports:
      - "8888:8888"
      - "4040:4040"                   # Spark UI for the running job
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=bigdata
    volumes:
      - ./workspace:/home/jovyan/work
    depends_on:
      - spark-master

volumes:
  redpanda_data:
  minio_data:
  grafana_data: